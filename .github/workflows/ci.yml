name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: Tests and static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy
        run: |
          tmpdir="$(mktemp -d)"
          mkdir -p "$tmpdir/custom_components"
          ln -s "$PWD" "$tmpdir/custom_components/nature_remo"
          MYPYPATH="$tmpdir" PYTHONPATH="$tmpdir" uv run mypy -p custom_components.nature_remo

      - name: Pytest
        run: uv run pytest

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage integration for hassfest
        run: |
          mkdir -p custom_components/nature_remo
          cp __init__.py climate.py config_flow.py echonet.py manifest.json sensor.py custom_components/nature_remo/
          cp -R translations custom_components/nature_remo/translations
          rm __init__.py climate.py config_flow.py echonet.py manifest.json sensor.py

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
