name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify manifest version matches release tag
        if: github.event_name == 'release'
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          tag = os.environ['GITHUB_REF_NAME'].removeprefix('v')
          version = json.load(open('manifest.json'))['version']
          if version != tag:
              sys.exit(f"manifest.json version {version!r} does not match release tag {tag!r}")
          PY

      - name: Set up pnpm
        if: github.event_name == 'release'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: GitHub Release
        if: github.event_name == 'release'
        run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build HACS release zip
        run: |
          mkdir -p dist/nature_remo
          cp __init__.py climate.py config_flow.py echonet.py manifest.json sensor.py dist/nature_remo/
          cp -R translations dist/nature_remo/translations
          cd dist/nature_remo
          zip -r ../nature_remo.zip .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nature_remo
          path: dist/nature_remo.zip
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            const assetPath = 'dist/nature_remo.zip'
            const assetName = path.basename(assetPath)
            const { owner, repo } = context.repo
            const release_id = context.payload.release.id

            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id,
            })
            const existingAsset = assets.find((asset) => asset.name === assetName)
            if (existingAsset) {
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: existingAsset.id,
              })
            }

            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id,
              name: assetName,
              data: fs.readFileSync(assetPath),
              headers: {
                'content-type': 'application/zip',
                'content-length': fs.statSync(assetPath).size,
              },
            })
