name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package integration
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify manifest version matches release tag
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          tag = os.environ['RELEASE_TAG'].removeprefix('v')
          version = json.load(open('custom_components/nature_remo/manifest.json'))['version']
          if version != tag:
              sys.exit(f"custom_components/nature_remo/manifest.json version {version!r} does not match release tag {tag!r}")
          PY

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: GitHub Release
        run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build HACS release zip
        run: |
          mkdir -p dist
          cd custom_components/nature_remo
          zip -r ../../dist/nature_remo.zip .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nature_remo
          path: dist/nature_remo.zip
          if-no-files-found: error

      - name: Upload release asset
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            const assetPath = 'dist/nature_remo.zip'
            const assetName = path.basename(assetPath)
            const tag = process.env.RELEASE_TAG
            const { owner, repo } = context.repo

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag,
            })
            const release_id = release.id

            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id,
            })
            const existingAsset = assets.find((asset) => asset.name === assetName)
            if (existingAsset) {
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: existingAsset.id,
              })
            }

            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id,
              name: assetName,
              data: fs.readFileSync(assetPath),
              headers: {
                'content-type': 'application/zip',
                'content-length': fs.statSync(assetPath).size,
              },
            })
